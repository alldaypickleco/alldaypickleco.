<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Contact Allday Pickle Co. — WhatsApp, email, or find us at Lai Chi Kok, Hong Kong."/>
<title>Contact | Allday Pickle Co.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#1B5C3F;--g2:#0F3D27;--o:#F47820;--lime:#7DC52E;--wa:#25D366;--cream:#F5F0E8;--dark:#0D1F17;--silver:#B8C4CA;--text:#1A1A1A;--muted:#6B6560;--light:#F9F6F1}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .7s}
#loader.hide{opacity:0;pointer-events:none}
.ldr-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;opacity:0;transform:translateY(14px);animation:fup .55s .1s forwards}
.ldr-circle{width:100px;height:100px;border-radius:50%;border:2px solid rgba(27,92,63,.55);background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:18px}
.ldr-bar{width:130px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:20px}
.ldr-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--lime),var(--o));animation:fill 1.2s ease forwards}
@keyframes fup{to{opacity:1;transform:translateY(0)}}
@keyframes fill{0%{width:0}100%{width:100%}}

/* LOGO */
.logo-circle{border-radius:50%;border:1.5px solid rgba(27,92,63,.45);background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.logo-ball{background:var(--lime);border-radius:50%;position:relative;display:inline-flex}
.logo-ball::after{content:'';position:absolute;inset:15%;border-radius:50%;border:1.5px solid rgba(0,0,0,.22)}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(245,240,232,.95);backdrop-filter:blur(14px);border-bottom:1px solid rgba(27,92,63,.1)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:1280px;margin:0 auto;padding:0 5vw}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-wm{display:flex;flex-direction:column;line-height:1.1}
.nav-wm span:first-child{font-size:13px;font-weight:800;color:var(--g)}
.nav-wm span:last-child{font-size:13px;font-weight:800;color:var(--o)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-links{display:flex;align-items:center;gap:20px}
.nav-links a{text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;transition:.2s;white-space:nowrap}
.nav-links a:hover{color:var(--g)}
.lang-sw{display:flex;align-items:center;gap:2px;background:rgba(27,92,63,.07);border-radius:20px;padding:3px}
.lb{background:none;border:none;color:var(--muted);padding:4px 9px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
.lb.on{background:var(--g);color:white}
.nav-cta{background:var(--o);color:white;padding:8px 16px;border-radius:22px;font-weight:700;font-size:13px;text-decoration:none;transition:.2s;white-space:nowrap}
.nav-cta:hover{background:#d96b0d}
.hbg{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:4px}
.hbg span{width:20px;height:2px;background:var(--text);border-radius:2px;display:block}
.mob-menu{display:none;position:absolute;top:56px;left:0;right:0;background:rgba(245,240,232,.98);backdrop-filter:blur(16px);border-bottom:1px solid rgba(27,92,63,.1);padding:12px 5vw 18px;flex-direction:column;z-index:99}
.mob-menu.open{display:flex}
.mob-menu a{text-decoration:none;color:var(--text);font-size:15px;font-weight:500;padding:11px 0;border-bottom:1px solid rgba(184,196,202,.25)}
.mob-lang{display:flex;gap:6px;padding:14px 0 6px}
.mob-lang button{flex:1;padding:9px;border-radius:10px;border:1.5px solid rgba(184,196,202,.5);background:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted)}
.mob-lang button.on{background:var(--g);color:white;border-color:var(--g)}
.mob-book{margin-top:10px;background:var(--o);color:white;padding:13px;border-radius:14px;text-align:center;font-weight:700;font-size:15px;font-family:inherit;cursor:pointer;text-decoration:none;display:block}

/* PAGE HERO */
.page-hero{background:linear-gradient(160deg,var(--g) 0%,var(--g2) 100%);padding:clamp(60px,8vw,100px) 5vw clamp(48px,6vw,80px);color:white}
.page-hero-inner{max-width:1280px;margin:0 auto}
.breadcrumb{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}
.breadcrumb a{color:rgba(255,255,255,.4);text-decoration:none;transition:.2s}
.breadcrumb a:hover{color:rgba(255,255,255,.7)}
.page-hero h1{font-family:'DM Serif Display',serif;font-size:clamp(36px,6vw,72px);font-weight:400;line-height:1.05;letter-spacing:-.03em;font-style:italic;margin-bottom:14px}
.page-hero h1 em{font-style:normal;color:var(--o)}
.page-hero p{font-size:clamp(13px,1.8vw,15px);color:rgba(255,255,255,.5);max-width:480px;line-height:1.7}

/* CONTACT GRID */
.contact-sec{padding:clamp(52px,7vw,92px) 5vw}
.contact-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}

/* CONTACT METHODS */
.contact-methods{display:flex;flex-direction:column;gap:16px}
.cm-card{background:white;border-radius:16px;border:1px solid rgba(184,196,202,.4);overflow:hidden;transition:.2s;text-decoration:none;display:block}
.cm-card:hover{border-color:var(--g);transform:translateY(-2px);box-shadow:0 8px 28px rgba(27,92,63,.1)}
.cm-card-inner{display:flex;align-items:center;gap:16px;padding:20px 22px}
.cm-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cm-icon.wa{background:rgba(37,211,102,.12)}
.cm-icon.ig{background:rgba(244,120,32,.1)}
.cm-icon.em{background:rgba(27,92,63,.08)}
.cm-content{flex:1;min-width:0}
.cm-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--silver);margin-bottom:3px}
.cm-value{font-size:15px;font-weight:700;color:var(--text)}
.cm-desc{font-size:12px;color:var(--muted);margin-top:2px}
.cm-arrow{font-size:18px;color:var(--silver);flex-shrink:0}

/* HOURS & LOCATION */
.info-block{background:white;border-radius:16px;border:1px solid rgba(184,196,202,.4);padding:24px}
.info-block+.info-block{margin-top:16px}
.info-title{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;margin-bottom:18px;color:var(--text)}
.info-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.info-row:last-child{margin-bottom:0}
.ir-icon{width:32px;height:32px;border-radius:9px;background:rgba(27,92,63,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.ir-content strong{display:block;font-size:13px;font-weight:700;margin-bottom:2px}
.ir-content span{font-size:12px;color:var(--muted);line-height:1.6}
.ir-content a{color:var(--g);font-weight:600;text-decoration:none}

/* MAP PLACEHOLDER */
.map-block{background:linear-gradient(135deg,var(--g),var(--g2));border-radius:16px;height:200px;display:flex;align-items:center;justify-content:center;color:white;margin-top:16px;position:relative;overflow:hidden}
.map-block-text{text-align:center}
.map-block-text strong{display:block;font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:4px}
.map-block-text span{font-size:12px;color:rgba(255,255,255,.5)}
.map-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:white;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;text-decoration:none;transition:.2s}
.map-btn:hover{background:rgba(255,255,255,.25)}

/* FORM */
.form-block{background:white;border-radius:16px;border:1px solid rgba(184,196,202,.4);padding:28px}
.form-title{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;margin-bottom:6px}
.form-desc{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--silver);margin-bottom:6px}
.form-input{width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid rgba(184,196,202,.65);background:white;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;transition:.2s;color:var(--text)}
.form-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(27,92,63,.08)}
.form-select{width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid rgba(184,196,202,.65);background:white;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;color:var(--text);cursor:pointer}
.form-select:focus{border-color:var(--g)}
textarea.form-input{resize:vertical;min-height:100px;line-height:1.6}
.form-submit{width:100%;padding:14px;border-radius:12px;border:none;background:var(--g);color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;box-shadow:0 4px 14px rgba(27,92,63,.25)}
.form-submit:hover{background:var(--g2);transform:translateY(-1px)}
.form-note{font-size:11px;color:var(--silver);margin-top:10px;text-align:center;line-height:1.6}
.form-success{display:none;text-align:center;padding:20px 0}
.form-success .fs-icon{font-size:44px;margin-bottom:12px}
.form-success h3{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:8px}
.form-success p{font-size:14px;color:var(--muted);line-height:1.7}

/* CTA */
.cta-sec{background:linear-gradient(160deg,var(--g),var(--g2));text-align:center;padding:clamp(52px,7vw,80px) 5vw}
.cta-sec .st{font-family:'DM Serif Display',serif;font-size:clamp(26px,4vw,50px);font-weight:400;line-height:1.1;color:white;margin-bottom:12px}
.btn-p{background:var(--o);color:white;padding:13px 26px;border-radius:30px;border:none;font-size:clamp(13px,1.8vw,15px);font-weight:700;cursor:pointer;text-decoration:none;transition:.2s;box-shadow:0 6px 20px rgba(244,120,32,.4);font-family:inherit;white-space:nowrap;display:inline-block}
.btn-p:hover{transform:translateY(-2px);background:#d96b0d}
.btn-o{color:white;padding:13px 22px;border-radius:30px;border:1.5px solid rgba(255,255,255,.2);font-size:clamp(13px,1.8vw,14px);font-weight:600;text-decoration:none;font-family:inherit;white-space:nowrap;background:transparent;display:inline-block}
.btn-o:hover{background:rgba(255,255,255,.08)}

/* FOOTER */
footer{background:var(--dark);color:white;padding:clamp(36px,5vw,52px) 5vw 28px}
.ft-inner{max-width:1280px;margin:0 auto}
.ft-top{display:grid;grid-template-columns:2fr 1fr 1fr;gap:44px;margin-bottom:32px}
.ft-brand p{font-size:12px;color:rgba(255,255,255,.3);line-height:1.7;max-width:240px;margin-top:11px}
.ft-col h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.28);margin-bottom:12px}
.ft-col a{display:block;color:rgba(255,255,255,.5);text-decoration:none;font-size:12px;margin-bottom:8px;transition:.2s}
.ft-col a:hover{color:white}
.ft-bot{border-top:1px solid rgba(255,255,255,.07);padding-top:18px;display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.18);flex-wrap:wrap;gap:6px}

.wa-float{position:fixed;bottom:18px;right:14px;background:var(--wa);color:white;padding:10px 16px;border-radius:30px;text-decoration:none;font-weight:700;font-size:13px;box-shadow:0 6px 18px rgba(37,211,102,.35);z-index:99;transition:.2s;display:flex;align-items:center;gap:6px}
.wa-float:hover{transform:translateY(-2px)}

@media(max-width:900px){
  .contact-inner{grid-template-columns:1fr}
  .ft-top{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .nav-links,.lang-sw,.nav-cta{display:none}
  .hbg{display:flex}
  .ft-top{grid-template-columns:1fr}
  .wa-txt{display:none}
  .wa-float{padding:12px;border-radius:50%;width:46px;height:46px;justify-content:center}
}
</style>
</head>

  document.getElementById('form-body').style.display='none';
  document.getElementById('form-success').style.display='block';
}
